{% extends 'index.html' %}
{% block body %}

<br><br><br><br><br>
<center>
<div class="card" style="width: 50rem;">
  <div class="card-header">
    SaveDrive
  </div>
  <div class="card-body">
    <h5 class="card-title"></h5>
    <form method="post">{% csrf_token %}

      <div class="form-group">
        <label for="nightRegenLevel">Nitrogen Level</label>
        <input type="text" class="form-control" name="n" id="nightRegenLevel" style="width: 18rem;">
      </div>
      <div class="form-group">
        <label for="posperes">Phosphorous</label>
        <input type="text" class="form-control" name="p" id="posperes" style="width: 18rem;">
      </div>
      <div class="form-group">
        <label for="potassium">Potassium</label>
        <input type="text" class="form-control" name="k" id="potassium" style="width: 18rem;">
      </div>
      <br><br>
    
      <button type="submit" class="btn btn-primary">Submit</button>


</form>
<br>
</div>
</div>
<div class="card shadow" style="width: 32rem;">
  <div class="card-body">
  
    
    <p class="card-text">{{result}}</p>
  </div>
</div>


  </div>
</div>

{% endblock %}
