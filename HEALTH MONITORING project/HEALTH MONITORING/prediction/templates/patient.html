{% extends 'index.html' %}
{% block body %}

<br><br><br><br><br>
<center>
<div class="card" style="width: 50rem;">
  <div class="card-header">
   </div>
  <div class="card-body">
    <h5 class="card-title"></h5>
    <form method="post">{% csrf_token %}

      <div class="form-group">
        <label for="nightRegenLevel">AGE</label>
        <input type="text" class="form-control"  name="age" id="nightRegenLevel" style="width: 18rem;">
      </div>
      <div class="form-group">
        <label for="posperes">Temperature</label>
        <input type="text" class="form-control" value="{{hb}}" name="hb" id="posperes" style="width: 18rem;">
      </div>
      <div class="form-group">
        <label for="potassium">Heart-Beat</label>
        <input type="text" class="form-control" value="{{temp}}" name="t" id="potassium" style="width: 18rem;">
      </div>
      <div class="form-group">
        <label for="potassium">ECG</label>
        <input type="text" class="form-control" value="{{ecg}}" name="ecg" id="potassium" style="width: 18rem;">
      </div>
      <br><br>
    
      <button type="submit" class="btn btn-primary">Submit</button>


</form>
<br>
</div>
</div>
<div class="card shadow" style="width: 32rem;">
  <div class="card-body">
  
    
    <p class="card-text">{{results}}</p>
    <br>
    <br>
    <p class="card-text"> Suggested Drug: {{prescrp}}</p>
  </div>
</div>


  </div>
</div>
</center>
<br><br><br><br><br>
{% endblock %}
