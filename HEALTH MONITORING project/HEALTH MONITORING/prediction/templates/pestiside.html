{% extends 'index.html' %}
{% block body %}

<br><br><br><br><br>
<center>
<div class="card" style="width: 50rem;">
  <div class="card-header">
    Pest 
  </div>
  <div class="card-body">
    <h5 class="card-title"></h5>
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      
      <div class="form-group">
        <label for="nightRegenLevel"></label>
        <select type="text" class="form-control" name="pest" id="nightRegenLevel" style="width: 18rem;"> 
        <option selected value="" disabled> Select a Pest</option>
        {% for pest in pests %}
        <option selected value="{{pest}}" > {{pest}}</option>
        {% endfor %}
        
        </select>
        
      </div>
      <br>
      <br>
      <button type="submit" class="btn btn-primary">Submit</button>

</form>
<br>
<div class="card" style="width: 32rem;">
  <div class="card-body">
    
    <h5 class="card-title">Pesticide: {{pesticide}} for {{pest}}</h5>
    
    <p class="card-text">Usage : {{usage}}</p>
  </div>
</div>
</center>
<br><br><br><br><br>
{% endblock %}
